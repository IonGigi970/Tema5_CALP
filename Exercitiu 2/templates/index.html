<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Monitorizare Date</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .dashboard-card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-custom { margin: 5px; border-radius: 8px; transition: 0.3s; }
        .btn-custom:hover { transform: translateY(-2px); }
        .graph-container { text-align: center; margin-top: 20px; }
        .graph-img { max-width: 100%; border-radius: 10px; border: 1px solid #dee2e6; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card dashboard-card p-4">
                <h2 class="text-center mb-4 text-primary">📊 Analiză Date Senzori</h2>
                <hr>
                
                <div class="text-center mb-4">
                    <p class="text-muted">Alege setul de date pe care dorești să îl vizualizezi:</p>
                    <form action="/plot" method="post">
                        <button type="submit" name="tip" value="toate" class="btn btn-outline-primary btn-custom shadow-sm">
                            📈 Toate Valorile
                        </button>
                        <button type="submit" name="tip" value="primele" class="btn btn-outline-success btn-custom shadow-sm">
                            ⏱️ Primele 6 (Head)
                        </button>
                        <button type="submit" name="tip" value="ultimele" class="btn btn-outline-info btn-custom shadow-sm">
                            🔍 Ultimele 5 (Puls & Durată)
                        </button>
                    </form>
                </div>

                {% if imagine %}
                <div class="graph-container">
                    <h5 class="text-secondary">Rezultat Vizualizare:</h5>
                    <img src="{{ url_for('static', filename=imagine) }}?{{ range(1, 1000) | random }}" class="graph-img shadow" alt="Grafic Generat">
                    <div class="mt-3">
                        <small class="text-muted">Graficul a fost generat pe baza fișierului <code>data.csv</code></small>
                    </div>
                </div>
                {% else %}
                <div class="alert alert-light text-center border">
                    Apasă un buton pentru a genera un grafic.
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>

</body>
</html>
